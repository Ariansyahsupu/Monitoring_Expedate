        // --- HELPER FUNCTIONS ---
        const calculateDays = (dateStr) => {
          if (!dateStr) return 0;
          let d = new Date(dateStr);
          if (isNaN(d.getTime())) {
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(dateStr)) {
              const parts = dateStr.split(/[\/\-]/);
              d = new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
            }
          }
          if (isNaN(d.getTime())) return 0;
          const diffTime = Math.abs(TODAY - d);
          return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const isDateOverdue = (dateStr) => {
          if (!dateStr) return false;
          let d = new Date(dateStr);
          if (isNaN(d.getTime())) {
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(dateStr)) {
              const parts = dateStr.split(/[\/\-]/);
              d = new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
            }
          }
          return !isNaN(d.getTime()) && d < TODAY;
        };

        const addDaysToDate = (dateStr, days) => {
          if (!dateStr) return '';
          let d = new Date(dateStr);
          if (isNaN(d.getTime())) {
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(dateStr)) {
              const parts = dateStr.split(/[\/\-]/);
              d = new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
            }
          }
          if (isNaN(d.getTime())) return dateStr;
          d.setDate(d.getDate() + days);
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        };

        const getStoEtaDetails = (stoPlant, stoDate) => {
          if (!stoPlant || !stoDate) return { date: stoDate, hasRule: false };
          const plantUpper = String(stoPlant).trim().toUpperCase();
          let days = 0;
          let hasRule = false;
          
          if (
            plantUpper.includes("MAS") || 
            plantUpper.includes("MME") || 
            plantUpper.includes("PKM")
          ) {
            days = 14;
            hasRule = true;
          } else if (plantUpper.includes("MHU")) {
            days = 3;
            hasRule = true;
          } else if (
            plantUpper.includes("BYN") || 
            plantUpper.includes("MBL") || 
            plantUpper.includes("CDI")
          ) {
            days = 7;
            hasRule = true;
          }

          if (hasRule) {
            return { date: addDaysToDate(stoDate, days), hasRule: true };
          }
          return { date: stoDate, hasRule: false };
        };

        const checkAlarms = (item) => {
          const alarms = [];
          const daysFromMO = calculateDays(item.moDate);
          const daysFromPR = item.prDate ? calculateDays(item.prDate) : 0;

          if (!item.hasPR) {
            if (daysFromMO > 2) {
              alarms.push({ type: 'danger', msg: `Waiting PR (>2 Hari)`, detail: `Belum PR di ZMMR004 (${daysFromMO} hari)` });
            } else {
              alarms.push({ type: 'warning', msg: `Waiting PR`, detail: `Belum PR di ZMMR004` });
            }
          }
          
          if (item.hasPR && !item.poDate && daysFromPR > 3) {
            alarms.push({ type: 'danger', msg: `Waiting PO (>3 Hari)`, detail: `${daysFromPR} hari sejak PR` });
          }
          
          if (item.type === 'Critical' && item.status !== 'Complete' && daysFromMO > 3) {
            alarms.push({ type: 'critical', msg: `Critical Overdue (>3 Hari)`, detail: `${daysFromMO} hari Total` });
          }
          
          if (item.type === 'OVH' && item.status !== 'Complete' && daysFromMO > 20) {
            alarms.push({ type: 'warning', msg: `OVH Overdue (>20 Hari)`, detail: `${daysFromMO} hari Total` });
          }

          if (item.status === 'Deliver to Depo') alarms.push({ type: 'info', msg: 'On Deliver Vendor to Depo' });
          if (item.status === 'Deliver to Site') alarms.push({ type: 'info', msg: 'On Deliver Depo to Site' });

          return alarms;
        };

                let triggerFallback = false;

                const fetchWithTimeout = async (resource, options = {}, timeout = 6000) => {
                    const controller = new AbortController();

                // Parser yang sangat kuat dan bersih untuk mengeliminasi Rupiah, IDR, spasi, dan format ribuan
                const parseNumeric = (raw) => {
                    if (!raw) return 0;
                    let str = String(raw).trim();
                    const isNegative = str.includes('(') || str.includes('-');
                    str = str.replace(/[^\d.,]/g, '');
                    if (!str || str === '.' || str === ',') return 0;
                    
                    if (str.includes('.') && str.includes(',')) {
                        if (str.lastIndexOf(',') > str.lastIndexOf('.')) {
                            str = str.replace(/\./g, '').replace(',', '.');
                        } else {
                            str = str.replace(/,/g, '');
                        }
                    } else if (str.includes(',')) {
                        const p = str.split(',');
                        if (p[p.length - 1].length === 3 && p.length > 1) {
                            str = str.replace(/,/g, '');
                        } else {
                            str = str.replace(/,/g, '.');
                        }
                    } else if (str.includes('.')) {
                        const p = str.split('.');
                        if (p.length > 2 || (p.length === 2 && p[1].length === 3)) {
                            str = str.replace(/\./g, '');
                        }
                    }
                    let num = parseFloat(str) || 0;
                    return isNegative ? -num : num;
                };

                if (syncCount === 0) setLoadingText('Mengunduh Data Utama (MO ZMMR001)...');
                try { 
                    csvTextMB25 = await fetchWithFallback(pubUrlMB25); 
                    csvTextMB25Prioritas = await fetchWithFallback(pubUrlMB25Prioritas);
                    try { csvTextZMMRAllSite = await fetchWithFallback(pubUrlZMMRAllSite); } catch(e) {}
                    if (!csvTextMB25) throw new Error("Kosong");
                    setIsOfflineDemo(false);
                } catch (e) { 
                    triggerFallback = true;
                }

                if (!triggerFallback) {
                    if (syncCount === 0) setLoadingText('Mengunduh Data Pendukung (PR/PO/GI/MB52)...');
                    csvTextZMMR = await fetchWithFallback(pubUrlZMMR);
                    csvTextME2N = await fetchWithFallback(pubUrlME2N);
                    csvTextMB51 = await fetchWithFallback(pubUrlMB51);
                    csvTextMB52 = await fetchWithFallback(pubUrlMB52);
                    csvTextP1BJM = await fetchWithFallback(pubUrlP1BJM);

                    if (syncCount === 0) setLoadingText('Mengkalkulasi & Memetakan Data...');

                    const parseCSV = (str) => {
                      if (!str) return [];
                      
                      let delimiter = ',';
                      const firstLine = str.split('\n')[0] || '';
                      const tabCount = firstLine.split('\t').length;
                      const commaCount = firstLine.split(',').length;
                      const semiCount = firstLine.split(';').length;
                      
                      if (tabCount > commaCount && tabCount > semiCount) {
                          delimiter = '\t';
                      } else if (semiCount > commaCount && semiCount > tabCount) {
                          delimiter = ';';
                      }

                      const result = [];
                      let row = [];
                      let inQuotes = false;
                      let currentVal = '';
                      for (let i = 0; i < str.length; i++) {
                        const char = str[i];
                        if (char === '"') {
                          if (inQuotes && str[i+1] === '"') {
                            currentVal += '"';
                            i++;
                          } else {
                            inQuotes = !inQuotes;
                          }
                        } else if (char === delimiter && !inQuotes) {
                          row.push(currentVal);
                          currentVal = '';
                        } else if (char === '\n' && !inQuotes) {
                          row.push(currentVal);
                          result.push(row);
                          row = [];
                          currentVal = '';
                        } else if (char !== '\r') {
                          currentVal += char;
                        }
                      }
                      row.push(currentVal);
                      if (row.length > 1 || currentVal.trim() !== '') {
                          result.push(row);
                      }
                      return result;
                    };

                    // ---- CROSS MATCHING BUILDER ----
                    const buildMB52CrossMatchingMap = (csvStr) => {
                        const map = new Map();
                        if (!csvStr) return map;
                        const rows = parseCSV(csvStr);
                        if (rows.length > 1) {
                            let headerIndex = -1;
                            for (let i = 0; i < Math.min(20, rows.length); i++) {
                                const rowText = rows[i].join('').toUpperCase();
                                if (rowText.includes('MATERIAL') && (rowText.includes('STORAGE') || rowText.includes('PLANT'))) {
                                    headerIndex = i;
                                    break;
                                }
                            }
                            if (headerIndex === -1) return map;
                            const headers = rows[headerIndex].map(h => h ? h.replace(/"/g, '').trim().toUpperCase() : '');
                            
                            const matColIdx = headers.findIndex(h => h === 'MATERIAL' || h === 'MATERIAL NUMBER');
                            const plantColIdx = headers.findIndex(h => h === 'PLANT' || h === 'PLNT');
                            const slocColIdx = headers.findIndex(h => h === 'STORAGE LOCATION' || h === 'SLOC');
                            const binColIdx = headers.findIndex(h => h === 'STORAGE BIN');
                            const batchColIdx = headers.findIndex(h => h === 'BATCH');
                            const uomColIdx = headers.findIndex(h => h === 'BASE UNIT OF MEASURE' || h === 'BUN');
                            const valColIdx = headers.findIndex(h => h === 'VALUE UNRESTR' || h.includes('VALUE UNRESTR') || h === 'VALUE UNRESTRICTED' || h.includes('VALUE') || h === 'NILAI');
                            
                            let qtyColIdx = headers.findIndex(h => h === 'UNRESTRICTED' || h.includes('UNRESTRICTED'));
                            if (qtyColIdx === -1) qtyColIdx = headers.findIndex(h => h === 'TOTAL STOCK' || h.includes('TOTAL STOCK'));

                            if (matColIdx === -1 || qtyColIdx === -1) return map;

                            let lastValidMatNo = '';
                            let lastValidPlant = '';

                            for (let i = headerIndex + 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || row.length === 0) continue;

                                let matNo = row[matColIdx] ? row[matColIdx].replace(/"/g, '').trim() : '';
                                if (matNo !== '') lastValidMatNo = matNo.replace(/^0+/, '').toUpperCase();
                                
                                let plantVal = plantColIdx !== -1 && row[plantColIdx] ? row[plantColIdx].replace(/"/g, '').trim().toUpperCase() : '';
                                if (plantVal !== '') lastValidPlant = plantVal;
                                
                                const sloc = slocColIdx !== -1 && row[slocColIdx] ? row[slocColIdx].replace(/"/g, '').trim().toUpperCase() : '';
                                const batch = batchColIdx !== -1 && row[batchColIdx] ? row[batchColIdx].replace(/"/g, '').trim() : '';

                                // Pengecekan Batch Damaged / Used / Bekas / Ex-Unit
                                const batchUpper = batch.toUpperCase();
                                const isDamaged = batchUpper.includes('DAMAGED') || batchUpper.includes('USED') || batchUpper.includes('EX-UNIT') || batchUpper.includes('BEKAS');
                                
                                if (isDamaged) continue;

                                if (lastValidMatNo) {
                                    if (!map.has(lastValidMatNo)) {
                                        map.set(lastValidMatNo, { dcQty: 0, dcValue: 0, bin: new Set(), batch: new Set(), uom: '', plantSoh: {} });
                                    }
                                    const matData = map.get(lastValidMatNo);

                                    const rawQty = row[qtyColIdx] ? row[qtyColIdx].replace(/"/g, '').trim() : '0';
                                    let cleanNumStr = rawQty;
                                    if (rawQty.includes('.') && rawQty.includes(',')) {
                                       if (rawQty.lastIndexOf(',') > rawQty.lastIndexOf('.')) {
                                           cleanNumStr = rawQty.replace(/\./g, '').replace(',', '.');
                                       } else {
                                           cleanNumStr = rawQty.replace(/,/g, '');
                                       }
                                    } else {
                                       cleanNumStr = rawQty.replace(/,/g, '');
                                    }
                                    const qty = parseFloat(cleanNumStr) || 0;

                                    if (qty > 0) {
                                        // Pisahkan alokasi untuk DC Palaran (PL28) dan Local SOH
                                        if (lastValidPlant.includes('28') || sloc.includes('28') || lastValidPlant === 'PL28' || sloc === 'PL28') {
                                            const value = parseNumeric(valColIdx !== -1 ? row[valColIdx] : '0');
                                            
                                            const bin = binColIdx !== -1 && row[binColIdx] ? row[binColIdx].replace(/"/g, '').trim() : '';
                                            const uom = uomColIdx !== -1 && row[uomColIdx] ? row[uomColIdx].replace(/"/g, '').trim() : '';

                                            matData.dcQty += qty;
                                            matData.dcValue += value;
                                            if (bin) matData.bin.add(bin);
                                            if (batch) matData.batch.add(batch);
                                            if (!matData.uom && uom) matData.uom = uom;
                                        } else {
                                            // Simpan SOH Lokal berdasarkan nama/kode Plant
                                            matData.plantSoh[lastValidPlant] = (matData.plantSoh[lastValidPlant] || 0) + qty;
                                        }
                                    }
                                }
                            }
                        }
                        return map;
                    };

                    // Process ZMMR All Site for Cross Matching
                    if (csvTextZMMRAllSite) {
                        const mb52CrossMap = buildMB52CrossMatchingMap(csvTextMB52);
                        const rowsZMMRAll = parseCSV(csvTextZMMRAllSite);
                        if (rowsZMMRAll.length > 1) {
                            const headersZMMRAll = rowsZMMRAll[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                            const parsedZMMRAll = rowsZMMRAll.slice(1).map(row => {
                              const rowObj = {};
                              headersZMMRAll.forEach((h, i) => {
                                  if(h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                              });
                              return rowObj;
                            });

                            const parseDateStr = (dStr) => {
                                if (!dStr) return new Date(9999, 11, 31).getTime();
                                const p = dStr.split(/[\/\-]/);
                                if (p.length >= 3) {
                                    return new Date(`${p[2]}-${p[1]}-${p[0]}`).getTime();
                                }
                                return new Date(dStr).getTime();
                            };

                            const crossItems = [];
                            
                            // 1. Kumpulkan semua MO Aktif (OUTSTANDING & IN PROGRESS)
                            parsedZMMRAll.forEach(item => {
                                const statDesc = String(item['Stat. Desc'] || item['Status'] || '').toUpperCase();
                                
                                if (statDesc.includes('OUTSTANDING') || statDesc.includes('IN PROGRESS')) {
                                    const orderIdRaw = String(item['Mtc. Order'] || item['Order'] || '');
                                    const orderId = orderIdRaw.replace(/^0+/, '').trim();
                                    if (!orderId) return;

                                    const matNo = String(item['Material'] || '').replace(/^0+/, '').toUpperCase();
                                    const reqQty = parseNumeric(item['Qty Res'] || item['Requirement Quantity'] || item['Quantity'] || 0);
                                    
                                    if (reqQty > 0) {
                                        const plantCode = String(item['Plant'] || '').trim().toUpperCase();
                                        const plantName = String(item['Plant Name'] || '').trim().toUpperCase();
                                        const creationDate = item['Creation Res Date'] || item['Req Date'] || '';
                                        
                                        crossItems.push({
                                            orderId,
                                            matNo,
                                            reqQty,
                                            plantCode,
                                            plantName,
                                            creationDate,
                                            timestamp: parseDateStr(creationDate),
                                            priority: item['Priority'] || '-',
                                            desc: String(item['Description'] || item['Part Number'] || ''),
                                            uomRaw: item['UoM'] || '',
                                            statDesc
                                        });
                                    }
                                }
                            });

                            // 2. Sortir berdasarkan Creation Date terlama agar diutamakan alokasinya
                            crossItems.sort((a, b) => a.timestamp - b.timestamp);

                            // 3. Kalibrasi SOH Lokal & Alokasi dari DC Palaran
                            const crossUniqueOrders = new Map();
                            
                            crossItems.forEach(item => {
                                const dcData = mb52CrossMap.get(item.matNo) || { dcQty: 0, dcValue: 0, bin: new Set(), batch: new Set(), uom: '', plantSoh: {} };
                                
                                // Kalibrasi: Cek Local SOH berdasarkan Plant Name/Code yang fleksibel
                                let availableLocalSoh = 0;
                                const matchingLocalSohKeys = [];
                                Object.keys(dcData.plantSoh).forEach(k => {
                                    const extractNum = (str) => {
                                        const m = str.match(/\d+/);
                                        return m ? m[0].replace(/^0+/, '') : str;
                                    };
                                    const zmmrNum = extractNum(item.plantCode);
                                    const mb52Num = extractNum(k);
                                    
                                    const isMatchByCode = (item.plantCode !== '' && k === item.plantCode) || (zmmrNum !== '' && mb52Num !== '' && zmmrNum === mb52Num);
                                    const isMatchByName = (item.plantName !== '' && (k.includes(item.plantName) || item.plantName.includes(k)));
                                    
                                    if (isMatchByCode || isMatchByName) {
                                        availableLocalSoh += dcData.plantSoh[k];
                                        matchingLocalSohKeys.push(k);
                                    }
                                });

                                // Hitung berapa SOH lokal yang bisa dikonsumsi MO ini
                                const usedLocalSoh = Math.min(item.reqQty, availableLocalSoh);
                                
                                // Hitung Rekomendasi/Kekurangan QTY
                                const recommendedQty = item.reqQty - usedLocalSoh;

                                // DEDUCT / Potong SOH lokal yang sudah digunakan agar MO dengan part yang sama berikutnya tidak double claim
                                let remainingToDeduct = usedLocalSoh;
                                for (const k of matchingLocalSohKeys) {
                                    if (remainingToDeduct <= 0) break;
                                    const availableInBin = dcData.plantSoh[k];
                                    const deduct = Math.min(availableInBin, remainingToDeduct);
                                    dcData.plantSoh[k] -= deduct;
                                    remainingToDeduct -= deduct;
                                }

                                if (recommendedQty > 0) {
                                    // Hitung Alokasi Stok DC (PL28)
                                    const unitPrice = dcData.dcQty > 0 ? (dcData.dcValue / dcData.dcQty) : 0;
                                    const readyQty = Math.min(recommendedQty, dcData.dcQty);
                                    const readyValue = readyQty * unitPrice;

                                    // Deduct stock di memory DC agar tidak double claim oleh MO lain
                                    if (dcData.dcQty > 0) {
                                        dcData.dcQty -= readyQty;
                                        dcData.dcValue -= readyValue;
                                    }
                                    
                                    const matObj = {
                                        material: item.matNo,
                                        desc: item.desc,
                                        qtyReqZMMR: item.reqQty,
                                        localSoh: availableLocalSoh, // Menampilkan Local SOH yang tersedia SEBELUM dipotong oleh MO ini
                                        qtyReq: recommendedQty, // Sebagai Nilai Rekomendasi
                                        qtyDC: readyQty,
                                        uom: dcData.uom || item.uomRaw || '',
                                        bin: Array.from(dcData.bin).join(', ') || '-',
                                        batch: Array.from(dcData.batch).join(', ') || '-',
                                        valueDC: readyValue,
                                        statDesc: item.statDesc,
                                        justification: readyQty > 0 ? "Material Tersedia di Warehouse DC Palaran." : "Stock Kosong di DC Palaran"
                                    };

                                    if (!crossUniqueOrders.has(item.orderId)) {
                                        crossUniqueOrders.set(item.orderId, {
                                            id: item.orderId,
                                            plant: item.plantName || item.plantCode || '-',
                                            priority: item.priority,
                                            materials: [matObj],
                                            totalReqQty: recommendedQty,
                                            totalReadyQty: readyQty,
                                            totalValue: readyValue
                                        });
                                    } else {
                                        const exist = crossUniqueOrders.get(item.orderId);
                                        exist.materials.push(matObj);
                                        exist.totalReqQty += recommendedQty;
                                        exist.totalReadyQty += readyQty;
                                        exist.totalValue += readyValue;
                                    }
                                }
                            });
                            
                            const finalCrossData = Array.from(crossUniqueOrders.values()).map(mo => {
                                mo.readinessPct = mo.totalReqQty > 0 ? Math.round((mo.totalReadyQty / mo.totalReqQty) * 100) : 0;
                                return mo;
                            });
                            
                            finalCrossData.sort((a,b) => b.readinessPct - a.readinessPct);
                            setDataCrossMatching(finalCrossData);
                        }
                    }
                    // ---- END CROSS MATCHING BUILDER ----

                    const rowsP1 = parseCSV(csvTextP1BJM);
                    if (rowsP1.length > 1) {
                        const headersP1 = rowsP1[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                        const parsedP1 = rowsP1.slice(1).map(row => {
                          const rowObj = {};
                          headersP1.forEach((h, i) => {
                              if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                          });
                          return rowObj;
                        }).filter(item => Object.values(item).some(val => val !== ''));
                        setDataP1Bjm(parsedP1);
                    }

                    const rowsME2N = parseCSV(csvTextME2N);
                    const me2nMap = new Map();
                    if (rowsME2N.length > 1) {
                        const headersME2N = rowsME2N[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                        const parsedME2N = rowsME2N.slice(1).map(row => {
                          const rowObj = {};
                          headersME2N.forEach((h, i) => {
                              if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                          });
                          return rowObj;
                        });

                        parsedME2N.forEach(row => {
                          const materialNum = row['Material'];
                          if (materialNum && materialNum.trim() !== '') {
                            let docDateVal = null;

                                const p = row['Document Date'].split(/[\/\-]/);
                                docDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                              } else docDateVal = row['Document Date'];
                            }

                            const cleanMat = materialNum.trim().replace(/^0+/, '');
                            
                            const qtyKey = Object.keys(row).find(k => k.toUpperCase().includes('ORDER QUANTITY') || k.toUpperCase() === 'QUANTITY' || k.toUpperCase() === 'QTY');
                            const orderQty = qtyKey ? row[qtyKey] : '';

                            const stillDelivKey = Object.keys(row).find(k => k.toUpperCase().includes('STILL TO BE DELIVERED') || k.toUpperCase().includes('STILL TO DELIV') || k.toUpperCase().includes('STILL TO'));
                            const rawStillDeliv = stillDelivKey ? row[stillDelivKey] : '0';
                            const stillDelivQty = parseFloat(String(rawStillDeliv).replace(/,/g, '')) || 0;

                            me2nMap.set(cleanMat, {
                              purchasingDoc: row['Purchasing Document'],

                              docDate: docDateVal,
                              stoQty: orderQty,

                            });

                        });
                    }

                    const rowsZMMR = parseCSV(csvTextZMMR);
                    let parsedZMMR = [];
                    const zmmrIndex = new Map();
                    
                    if (rowsZMMR.length > 1) {
                        const headersZMMR = rowsZMMR[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                        parsedZMMR = rowsZMMR.slice(1).map(row => {
                          const rowObj = {};

                          });
                          
                          const indexKeys = [
                              String(rowObj['Tracking No.'] || '').trim().toUpperCase().replace(/^0+/, ''),

                          ];
                          
                          indexKeys.forEach(k => {

                    }

                    const rowsMB51 = parseCSV(csvTextMB51);
                    const mb51Map = new Map();
                    if (rowsMB51.length > 1) {
                        const headersMB51 = rowsMB51[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                        const parsedMB51 = rowsMB51.slice(1).map(row => {
                          const rowObj = {};
                          headersMB51.forEach((h, i) => {
                              if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                          });

                        });

                        parsedMB51.forEach(row => {
                          const moOrder = row['Order'];

                          if (moOrder && matNo) {
                            const cleanMat = matNo.replace(/^0+/, '');
                            
                            let giDateVal = row['Posting Date'] || null;
                            if (giDateVal && /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(giDateVal)) {
                              const p = giDateVal.split(/[\/\-]/);
                              giDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                            }

                            mb51Map.set(`${moOrder}_${cleanMat}`, {
                              giNum: row['Material Document'],
                              giDate: giDateVal || row['Posting Date']
                            });
                          }
                        });
                    }

                    const buildSOHMap = (csvStr) => {
                        const map = new Map();
                        if (!csvStr) return map;
                        const rows = parseCSV(csvStr);
                        if (rows.length > 1) {
                            let headerIndex = -1;
                            for (let i = 0; i < Math.min(20, rows.length); i++) {
                                const rowText = rows[i].join('').toUpperCase();
                                if (rowText.includes('MATERIAL') && (rowText.includes('STORAGE') || rowText.includes('PLANT') || rowText.includes('VALUATION') || rowText.includes('UNRESTRICTED') || rowText.includes('STOCK'))) {
                                    headerIndex = i;
                                    break;
                                }
                            }

                            if (headerIndex === -1) return map;

                            const headers = rows[headerIndex].map(h => h ? h.replace(/"/g, '').trim().toUpperCase() : '');
                            
                            const matColIdx = headers.findIndex(h => h === 'MATERIAL' || h === 'MATERIAL NUMBER' || h.includes('MATERIAL'));
                            const slocColIdx = headers.findIndex(h => h === 'STORAGE LOCATION' || h === 'SLOC' || h.includes('STORAGE') || h.includes('SLOC'));
                            const batchColIdx = headers.findIndex(h => h === 'BATCH' || h.includes('BATCH'));
                            const plantColIdx = headers.findIndex(h => h === 'PLANT' || h === 'PLNT');
                            
                            let qtyColIdx = headers.findIndex(h => h === 'UNRESTRICTED' || h.includes('UNRESTRICTED'));
                            if (qtyColIdx === -1) qtyColIdx = headers.findIndex(h => h === 'TOTAL STOCK' || h.includes('TOTAL STOCK'));
                            if (qtyColIdx === -1) qtyColIdx = headers.findIndex(h => h === 'QTY' || h.includes('QUANTITY'));
                            if (qtyColIdx === -1) qtyColIdx = headers.findIndex(h => h.includes('STOCK VALUE ON PERIOD END') || h.includes('STOCK VALUE'));
                            if (qtyColIdx === -1) qtyColIdx = headers.findIndex(h => h.includes('STOCK') && !h.includes('VALUE'));
                            if (qtyColIdx === -1) qtyColIdx = headers.findIndex(h => h.includes('STOCK') || h.includes('VALUE'));

                            if (matColIdx === -1 || qtyColIdx === -1) return map;

                            let lastValidMatNo = '';
                            let lastValidPlant = '';

                            for (let i = headerIndex + 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || row.length === 0) continue;

                                let matNo = row[matColIdx] ? row[matColIdx].replace(/"/g, '').trim() : '';
                                if (matNo !== '') {
                                    lastValidMatNo = matNo.replace(/^0+/, '').toUpperCase();
                                }
                                
                                let plantVal = plantColIdx !== -1 && row[plantColIdx] ? row[plantColIdx].replace(/"/g, '').trim().toUpperCase() : '';
                                if (plantVal !== '') {
                                    lastValidPlant = plantVal;
                                }

                                if (lastValidMatNo) {
                                    const sloc = slocColIdx !== -1 && row[slocColIdx] ? row[slocColIdx].replace(/"/g, '').trim().toUpperCase() : '';
                                    const batch = batchColIdx !== -1 && row[batchColIdx] ? row[batchColIdx].replace(/"/g, '').trim().toUpperCase() : '';
                                    
                                    const isDamaged = 
                                        batch.includes('DAMAGED') || batch.includes('EX') || batch.includes('USED') ||
                                        sloc.includes('DAMAGED') || sloc.includes('EX') || sloc.includes('USED');

                                    if (!isDamaged) {
                                        const qty = parseNumeric(row[qtyColIdx]);
                                        
                                        if (qty > 0) {
                                            if (!map.has(lastValidMatNo)) {
                                                map.set(lastValidMatNo, { total: 0, sites: {} });
                                            }
                                            const matData = map.get(lastValidMatNo);
                                            matData.total += qty;
                                            
                                            const siteName = lastValidPlant || 'UNKNOWN_SITE';
                                            matData.sites[siteName] = (matData.sites[siteName] || 0) + qty;
                                        }
                                    }
                                }
                            }
                        }
                        return map;
                    };

                    const mb52Map = buildSOHMap(csvTextMB52);

                    const processTrackingData = (csvData) => {

                        const rowsMB25 = parseCSV(csvData);

                        const headersMB25 = rowsMB25[0].map((h, i) => {
                          let name = h ? h.replace(/"/g, '').trim() : '';
                          if (name === 'Quantity') {

                                          isFinal: false,
                                          isOverdue: false,
                                          remarks: `Sisa Stock Tersedia: ${mat.stockGudang} PC`
                                        };
                                    } else {
                                        if (mat.isSTO) {
                                            prOrStoStep = {
                                              title: "Stock Transfer Order",
                                              date: mat.stoDate || TODAY.toLocaleDateString('id-ID'),
                                              active: true,
                                              desc: `Purchasing Document: ${mat.stoNum} | Order Qty: ${mat.stoQty || '-'}`,
                                              isFinal: false,
                                              isOverdue: false,
                                              remarks: `Supplying Plant: ${mat.stoPlant}`
                                            };
                                        } else {
                                            prOrStoStep = {
                                              title: "Purchase Requisition (PR)",
                                              date: TODAY.toLocaleDateString('id-ID'),
                                              active: false,
                                              desc: `Belum di-release | ${otherStockText}`,
                                              isFinal: false,
                                              isOverdue: true,
                                              remarks: hasOtherStock ? "Saran STO: Cek ketersediaan di site lain" : "Waiting Creat PR / Creat STO"
                                            };
                                        }
                                    }
                                } else {
                                    prOrStoStep = isSTO ? { 
                                      title: "STO Maneuver (No PR Required)", 
                                      date: mat.stoDate, 
                                      active: true, 
                                      desc: `Maneuver STO via ME2N - Supplying Plant: ${mat.stoPlant}`, 
                                      isFinal: false, 
                                      isOverdue: false 
                                    } : { 
                                      title: "Purchase Requisition (PR)", 
                                      date: mat.prDate, 
                                      active: mat.hasPR, 
                                      desc: mat.hasPR && mat.prNum ? `PR No: ${mat.prNum} (Tgl: ${mat.prDate})` : `Belum di-release | ${otherStockText}`, 
                                      isFinal: false, 
                                      isOverdue: false,
                                      remarks: (!mat.hasPR && hasOtherStock) ? "Saran STO: Cek ketersediaan di site lain" : (!mat.hasPR ? "Waiting Creat PR / Creat STO" : null)
                                    };
                                }

                                if (isUsingStock) {
                                  steps = [
                                    { title: "Material Order Dibuat", date: trk.moDate, active: true, desc: `Order: ${trk.id} (Tgl: ${trk.moDate}) - Part: ${mat.material} (Qty Res: ${mat.qtyReq})`, isFinal: false, isOverdue: false },
                                    prOrStoStep,
                                    { 
                                      title: "Goods Issue (GI)", 
                                      date: mat.giDate || TODAY.toLocaleDateString('id-ID'), 
                                      active: !!mat.giNum, 
                                      desc: mat.giNum ? `GI No: ${mat.giNum} (Qty GI: ${mat.qtyGI} | Status: Administrasi Close)` : "Barang belum di-GI", 
                                      isFinal: true, 
                                      isOverdue: !mat.giNum, 
                                      remarks: mat.giNum ? "MO Closed" : "Lakukan GI agar item ini close" 
                                    }
                                  ];
                                } else {
                                  steps = [
                                    { title: "Material Order Dibuat", date: trk.moDate, active: true, desc: `Order: ${trk.id} (Tgl: ${trk.moDate}) - Part: ${mat.material} (Qty Res: ${mat.qtyReq})`, isFinal: false, isOverdue: false },
                                    prOrStoStep,
                                    isSTO ? { 
                                      title: "Purchasing Document (STO)", 
                                      date: mat.stoDate, 
                                      active: true, 
                                      desc: `Doc No: ${mat.stoNum} (Tgl: ${mat.stoDate})`, 
                                      isFinal: false, 
                                      isOverdue: false 
                                    } : { 
                                      title: "Purchase Order (PO)", 
                                      date: mat.poDate, 
                                      active: !!mat.poDate, 
                                      desc: mat.poNum ? `PO No: ${mat.poNum} (Tgl: ${mat.poDate})` : "Menunggu PO Number diterbitkan", 
                                      isFinal: false, 
                                      isOverdue: false 
                                    },
                                    { title: "Vendor Processing", date: mat.poDate || mat.stoDate, active: !!mat.vendorDesc || isSTO, desc: mat.vendorDesc ? `${mat.vendorDesc} - ${mat.vendorCity}` : (isSTO ? `Supplying: ${mat.stoPlant}` : "Menunggu konfirmasi Vendor"), isFinal: false, isOverdue: false },
                                    { 
                                      title: "Estimasi Kedatangan (ETA)", 
                                      date: isWaitingForPRorSTO ? null : calculatedStoEtaDate, 
                                      active: (!!calculatedStoEtaDate || isSTO) && !isWaitingForPRorSTO, 
                                      desc: mat.deliveryDate ? `Tiba di tujuan pada: ${mat.deliveryDate}` : (isSTO ? `Estimasi STO: ${calculatedStoEtaDate}` : "Tanggal resi belum tersedia"), 
                                      isFinal: false, 
                                      isOverdue: isEtaOverdue,
                                      remarks: (isSTO && stoEtaDetails.hasRule) ? "Estimasi berdasarkan Rata-rata Pengiriman Dari Site atau Supplying" : null
                                    },
                                    { 
                                      title: "Good Receive (GR)", 
                                      date: mat.grDate, 
                                      active: !!mat.grNum || isMatComplete, 
                                      desc: mat.grNum ? `GR No: ${mat.grNum} (Qty: ${mat.qtyRec}/${mat.qtyReq})` : (isMatComplete ? `Status: Complete (Qty: ${mat.qtyRec}/${mat.qtyReq})` : "Barang belum diterima / GR"), 
                                      isFinal: false, 
                                      isOverdue: isMatComplete && mat.qtyRec < mat.qtyReq, 
                                      remarks: (isMatComplete && mat.qtyRec < mat.qtyReq) ? "GR Partial mohon lakukan FU dan Kalibrasi stock atau lakukan stock opname" : (mat.grNum ? `Total Stock: ${mat.stockGudang} PC` : null) 
                                    },
                                    { title: "Goods Issue (GI)", date: mat.giDate, active: !!mat.giNum, desc: mat.giNum ? `GI No: ${mat.giNum} (Qty GI: ${mat.qtyGI} | Status: Administrasi Close)` : "Menunggu proses GI", isFinal: true, isOverdue: !!mat.grNum && !mat.giNum, remarks: mat.giNum ? "MO Closed" : (mat.grNum ? "Silakan lakukan GI" : null) }
                                  ];
                                }
                              }

                              return (
                                <div className="flex flex-col">
                                  {isMoClosedComplete && (
                                    <div className="mb-6 bg-emerald-50 border border-emerald-200 p-4 rounded-xl flex items-center shadow-sm z-10 relative">
                                      <IconCheckCircle2 className="w-8 h-8 text-emerald-500 flex-shrink-0 mr-3" />
                                      <div>
                                        <p className="text-emerald-800 font-extrabold text-lg">Status MO tersebut 100% Complete</p>
                                        <p className="text-emerald-600 text-sm font-medium">Seluruh material pada MO ini telah terpenuhi via Stock / STO.</p>
                                      </div>
                                    </div>
                                  )}
                                  <div className="relative pt-2 pb-2">
                                    <div className="absolute left-[11px] top-4 bottom-4 w-1 bg-slate-200 rounded-full"></div>
                                    
                                    <div className="space-y-8 relative">
                                      {steps.map((step, sIdx) => (
                                         <div key={`step-${sIdx}`} className={`flex items-start ${step.active || step.isOverdue ? 'opacity-100' : 'opacity-40 transition-opacity'}`}>
                                            <div className={`relative z-10 w-6 h-6 rounded-full flex items-center justify-center border-[3px] border-white shadow-md mt-0.5 flex-shrink-0 ${
                                              step.isOverdue 
                                                ? 'bg-rose-600 animate-pulse'
                                                : step.active 
                                                  ? (step.isFinal ? 'bg-gradient-to-br from-emerald-500 to-green-600' : 'bg-gradient-to-br from-[#9B2226] to-[#C12A2F]') 
                                                  : 'bg-slate-300'
                                            }`}>
                                              {step.isFinal && step.active && <IconCheckCircle2 className="w-3 h-3 text-white" />}
                                              {step.isOverdue && <IconAlertTriangle className="w-3 h-3 text-white" />}
                                            </div>
                                            
                                            <div className={`ml-5 flex-1 bg-white p-3 rounded-lg border shadow-sm relative -mt-2 ${step.isOverdue ? 'border-rose-500 bg-rose-50 ring-1 ring-rose-500/50' : (step.isFinal && step.active ? 'border-emerald-200 bg-emerald-50/30 bg-white' : 'border-slate-100 bg-white')}`}>
                                               <h3 className={`text-sm md:text-base font-extrabold ${step.isOverdue ? 'text-rose-800' : (step.active ? (step.isFinal ? 'text-emerald-700' : 'text-slate-800') : 'text-slate-500')}`}>{step.title}</h3>
                                               <div className="flex flex-col md:flex-row md:items-center mt-1 md:space-x-2">
                                                  <span className={`text-xs md:text-sm font-extrabold ${step.isOverdue ? 'text-rose-700' : (step.active ? (step.isFinal ? 'text-emerald-600' : 'text-[#9B2226]') : 'text-slate-400')}`}>
                                                    {step.date || '--/--/----'}
                                                  </span>
                                                  {step.remarks && (
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded md:inline-block block w-fit ${step.isOverdue ? 'bg-rose-200 text-rose-800 border-rose-300 border' : 'bg-amber-50 text-amber-700 border border-amber-200'}`}>
                                                      {step.remarks}
                                                    </span>
                                                  )}
                                                  <span className="hidden md:inline text-slate-300">|</span>
                                                  <span className={`text-xs md:text-sm font-medium truncate mt-0.5 md:mt-0 ${step.isOverdue ? 'text-rose-800 font-bold' : (step.isFinal && step.active ? 'text-emerald-700 font-bold' : 'text-slate-500')}`}>
                                                    {step.isOverdue ? `${step.desc} - OVERDUE (Lakukan Follow Up)` : step.desc}
                                                  </span>
                                               </div>
                                            </div>
                                         </div>
                                      ))}
                                    </div>
                                  </div>
                                </div>
                              );
                           })()}
                         </div>
                       )}
                    </div>
                  </div>
                </div>
              )}

              {isAlarmPopupOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                  <div className="bg-[#F8FAFC] rounded-2xl shadow-2xl w-full max-w-5xl max-h-[85vh] flex flex-col overflow-hidden border border-slate-200">
                    <div className="p-5 border-b border-red-900/20 flex justify-between items-center bg-[#9B2226] text-white">
                      <div className="flex items-center">
                        <IconBell className="w-6 h-6 mr-3 animate-bounce" />
                        <h2 className="text-xl font-extrabold tracking-wide">ALARM & NOTIFICATION CENTER</h2>
                      </div>
                      <button onClick={() => setIsAlarmPopupOpen(false)} className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-bold transition border border-white/20 shadow-sm">
                        TUTUP
                      </button>
                    </div>
                    <div className="p-0 overflow-y-auto custom-scrollbar flex-1 bg-white">
                       <div className="overflow-x-auto w-full">
                         <table className="w-full text-left border-collapse whitespace-nowrap">
                           <thead className="bg-slate-50 sticky top-0 z-10 border-b border-slate-200 shadow-sm">
                             <tr className="text-slate-500 text-[11px] uppercase tracking-wider">
                               <th className="px-6 py-4 font-bold">MO Number</th>
                               <th className="px-6 py-4 font-bold">Req Date</th>
                               <th className="px-6 py-4 font-bold">Reservation</th>
                               <th className="px-6 py-4 font-bold">Type</th>
                               <th className="px-6 py-4 font-bold w-1/2">Alert Details</th>
                             </tr>
                           </thead>
                           <tbody className="text-sm divide-y divide-slate-100">
                              {data.map((item, index) => {
                                const alarms = checkAlarms(item).filter(a => ['danger', 'critical', 'warning'].includes(a.type));
                                if (alarms.length === 0) return null;

                                return (
                                  <tr key={`popup-alarm-${item.id}-${index}`} className="hover:bg-rose-50/40 transition-colors group">
                                    <td className="px-6 py-3 font-extrabold text-slate-800">{item.id}</td>
                                    <td className="px-6 py-3 font-medium text-slate-600">
                                      <div className="flex items-center text-xs">
                                        <IconClock className="w-3 h-3 mr-1" /> {item.moDate}
                                      </div>
                                    </td>
                                    <td className="px-6 py-3 font-medium text-slate-500">{item.reservation || 'N/A'}</td>
                                    <td className="px-6 py-3">
                                      <span className={`text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider ${
                                        item.type === 'Critical' ? 'bg-red-50 text-red-700 ring-1 ring-inset ring-red-600/20' : 
                                        item.type === 'OVH' ? 'bg-purple-50 text-purple-700 ring-1 ring-inset ring-purple-600/20' : 'bg-slate-50 text-slate-700 ring-1 ring-inset ring-slate-600/20'
                                      }`}>{item.type}</span>
                                    </td>
                                    <td className="px-6 py-3">
                                      <div className="flex flex-col space-y-1.5">
                                        {alarms.map((alarm, idx) => (
                                          <div key={`popup-alarm-item-${idx}`} className="flex items-center text-sm">
                                            <span className="relative flex h-2.5 w-2.5 mr-2.5 flex-shrink-0">
                                              <span className={`animate-ping absolute inline-flex h-full w-full rounded-full ${alarm.type === 'warning' ? 'bg-amber-400' : 'bg-rose-400'} opacity-75`}></span>
                                              <span className={`relative inline-flex rounded-full h-2.5 w-2.5 ${alarm.type === 'warning' ? 'bg-amber-500' : 'bg-rose-500'}`}></span>
                                            </span>
                                            <span className={`font-bold ${alarm.type === 'warning' ? 'text-amber-600' : 'text-rose-600'} mr-2`}>
                                              {alarm.msg}
                                            </span>
                                            <span className="text-xs text-slate-500 bg-slate-50 px-2 py-0.5 rounded border border-slate-100">
                                              {alarm.detail}
                                            </span>
                                          </div>
                                        ))}
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })}
                           </tbody>
                         </table>
                       </div>
                    </div>
                  </div>
                </div>
              )}

              {isPassModalOpen && (
                <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/80 backdrop-blur-md p-4 animate-fade-in">
                  <div className="bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] w-full max-w-md border border-slate-200/60 overflow-hidden">
                    <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-[#9B2226] text-white">
                      <div className="flex items-center space-x-2">
                        <IconSearchCode className="w-5 h-5 text-white/90" />
                        <h3 className="text-lg font-bold tracking-wide">Akses Terbatas</h3>
                      </div>
                      <button 
                        onClick={() => setIsPassModalOpen(false)} 
                        className="text-white/70 hover:text-white font-extrabold text-sm"
                      >
                        BATAL
                      </button>
                    </div>
                    <form 
                      onSubmit={(e) => {
                        e.preventDefault();
                        if (passwordInput === 'SPEX') {
                          setIsAuthenticated(true);
                          setIsPassModalOpen(false);
                          setCurrentView('dashboard');
                          setPassError('');
                        } else {
                          setPassError('Kode akses salah! Hubungi Administrator.');
                        }
                      }}
                      className="p-6 space-y-4"
                    >
                      <div className="text-center">
                        <p className="text-sm text-slate-600 font-medium">
                          Halaman <span className="font-extrabold text-[#9B2226]">Plant Dept Material Monitoring</span> dilindungi kode akses internal. Silakan masukkan kode akses Anda untuk melanjutkan.
                        </p>
                      </div>
                      <div className="space-y-2">
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">KODE AKSES (PASSWORD)</label>
                        <input 
                          type="password" 
                          placeholder="Masukkan Kode Akses..." 
                          className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl font-mono text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-[#9B2226]/30 transition shadow-sm"
                          value={passwordInput}
                          onChange={(e) => setPasswordInput(e.target.value)}
                          required
                          autoFocus
                        />
                        {passError && (
                          <p className="text-xs text-rose-600 font-bold text-center mt-1 flex items-center justify-center">
                            <IconAlertTriangle className="w-3.5 h-3.5 mr-1 flex-shrink-0 animate-bounce" /> {passError}
                          </p>
                        )}
                      </div>
                      <button 
                        type="submit" 
                        className="w-full bg-gradient-to-r from-[#9B2226] to-[#C12A2F] hover:from-[#811D1D] hover:to-[#A32327] text-white py-3 rounded-xl font-bold uppercase tracking-wider transition-all duration-300 shadow-md flex items-center justify-center"
                      >
                        Verifikasi Akses
                      </button>
                    </form>
                  </div>
                </div>
              )}

              {osAlert.show && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center bg-slate-900/80 backdrop-blur-md p-4 animate-fade-in">
                  <div className="bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] w-full max-w-md border border-slate-200/60 overflow-hidden">
                    <div className="p-5 border-b border-rose-100 flex justify-between items-center bg-rose-50 text-rose-800">
                      <div className="flex items-center space-x-2">
                        <IconAlertTriangle className="w-6 h-6 text-rose-600 animate-pulse" />
                        <h3 className="text-lg font-bold tracking-wide">Peringatan Outstanding</h3>
                      </div>
                    </div>
                    <div className="p-6 text-center space-y-4">
                      <p className="text-sm text-slate-600 font-medium">
                        Terdapat <span className="font-extrabold text-rose-600 text-xl mx-1">{osAlert.count}</span> material yang masih berstatus <span className="font-bold text-slate-800">OUTSTANDING</span> pada MO ini.
                      </p>
                      <p className="text-xs text-slate-500">
                        MO ini belum sepenuhnya completed. Material yang Outstanding akan otomatis ditampilkan pada urutan teratas di dalam pelacakan.
                      </p>
                      <button 
                        onClick={() => {
                          const found = osAlert.foundMo;
                          setOsAlert({ show: false, count: 0, foundMo: null });
                          
                          setSelectedTrackingMO(found.id);
                          setSelectedTrackingItemIndex('0');
                          setMaterialSearchInput(found.materials[0].material);
                          setIsTrackingModalOpen(true);
                        }}
                        className="w-full bg-gradient-to-r from-rose-600 to-rose-700 hover:from-rose-700 hover:to-rose-800 text-white py-3 rounded-xl font-bold uppercase tracking-wider transition-all duration-300 shadow-md flex items-center justify-center mt-4"
                      >
                        Oke, Lacak Material
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        // Render aplikasi ke dalam root element
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
