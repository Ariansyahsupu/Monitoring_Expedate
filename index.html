    // --- HELPER FUNCTIONS ---
    const calculateDays = (dateStr) => {
      if (!dateStr) return 0;
      let d = new Date(dateStr);
      if (isNaN(d.getTime())) {
        if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(dateStr)) {
          const parts = dateStr.split(/[\/\-]/);
          d = new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
        }
      }
      if (isNaN(d.getTime())) return 0;
      const diffTime = Math.abs(TODAY - d);
      return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    };

    const isDateOverdue = (dateStr) => {
      if (!dateStr) return false;
      let d = new Date(dateStr);
      if (isNaN(d.getTime())) {
        if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(dateStr)) {
          const parts = dateStr.split(/[\/\-]/);
          d = new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
        }
      }
      return !isNaN(d.getTime()) && d < TODAY;
    };

    const addDaysToDate = (dateStr, days) => {
      if (!dateStr) return '';
      let d = new Date(dateStr);
      if (isNaN(d.getTime())) {
        if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(dateStr)) {
          const parts = dateStr.split(/[\/\-]/);
          d = new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
        }
      }
      if (isNaN(d.getTime())) return dateStr;
      d.setDate(d.getDate() + days);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    // Fungsi pembantu untuk memproses kalkulasi ETA khusus STO berdasarkan Supplying Plant
    const getStoEtaDetails = (stoPlant, stoDate) => {
      if (!stoPlant || !stoDate) return { date: stoDate, hasRule: false };
      const plantUpper = String(stoPlant).trim().toUpperCase();
      let days = 0;
      let hasRule = false;
      
      if (
        plantUpper.includes("MAS") || 
        plantUpper.includes("MME") || 
        plantUpper.includes("PKM")
      ) {
        days = 14;
        hasRule = true;
      } else if (plantUpper.includes("MHU")) {
        days = 3;
        hasRule = true;
      } else if (
        plantUpper.includes("BYN") || 
        plantUpper.includes("MBL") || 
        plantUpper.includes("CDI")
      ) {
        days = 7; // 1 Minggu
        hasRule = true;
      }

      if (hasRule) {
        return { date: addDaysToDate(stoDate, days), hasRule: true };
      }
      return { date: stoDate, hasRule: false };
    };

    const checkAlarms = (item) => {
      const alarms = [];
      const daysFromMO = calculateDays(item.moDate);
      const daysFromPR = item.prDate ? calculateDays(item.prDate) : 0;

      // 1. MO to PR (Pengecekan PR)
      if (!item.hasPR) {
        if (daysFromMO > 2) {
          alarms.push({ type: 'danger', msg: `Waiting PR (>2 Hari)`, detail: `Belum PR di ZMMR004 (${daysFromMO} hari)` });
        } else {
          alarms.push({ type: 'warning', msg: `Waiting PR`, detail: `Belum PR di ZMMR004` });
        }
      }
      
      // 2. PR to PO (Standar 3 Hari)
      if (item.hasPR && !item.poDate && daysFromPR > 3) {
        alarms.push({ type: 'danger', msg: `Waiting PO (>3 Hari)`, detail: `${daysFromPR} hari sejak PR` });
      }
      
      // 3. MO to GR Critical (Standar 3 Hari)
      if (item.type === 'Critical' && item.status !== 'Complete' && daysFromMO > 3) {
        alarms.push({ type: 'critical', msg: `Critical Overdue (>3 Hari)`, detail: `${daysFromMO} hari Total` });
      }
      
      // 4. MO to GR OVH (Standar 20 Hari)
      if (item.type === 'OVH' && item.status !== 'Complete' && daysFromMO > 20) {
        alarms.push({ type: 'warning', msg: `OVH Overdue (>20 Hari)`, detail: `${daysFromMO} hari Total` });
      }

      // 5. Tracking Status Normal
      if (item.status === 'Deliver to Depo') alarms.push({ type: 'info', msg: 'On Deliver Vendor to Depo' });
      if (item.status === 'Deliver to Site') alarms.push({ type: 'info', msg: 'On Deliver Depo to Site' });

      return alarms;
    };

              }

              try {
                  const resMB52 = await fetch(pubUrlMB52);
                  if (resMB52.ok) {
                    csvTextMB52 = await resMB52.text();
                    if (csvTextMB52.trim().startsWith('<')) csvTextMB52 = '';
                  }
              } catch (e) {
                  console.warn("MB52 fetch failed", e);
                  csvTextMB52 = '';
              }

            } else {
              // Gunakan Data Fallback jika terblokir oleh browser security
              setIsOfflineDemo(true);
              csvTextMB25 = MOCK_MB25_CSV;
              csvTextZMMR = MOCK_ZMMR_CSV;
              csvTextME2N = MOCK_ME2N_CSV;
            }

            // CSV Parser Logic
            const parseCSV = (str) => {
              if (!str) return [];
              const arr = [];
              let quote = false;
              let row = 0, col = 0, c = 0;
              for (; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
              }
              return arr;
            };

            // --- PROSES DATA P1 BJM ---
            const rowsP1 = parseCSV(csvTextP1BJM);
            if (rowsP1.length > 1) {
                const headersP1 = rowsP1[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                const parsedP1 = rowsP1.slice(1).map(row => {
                  const rowObj = {};
                  headersP1.forEach((h, i) => {
                      if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                  });
                  return rowObj;
                }).filter(item => Object.values(item).some(val => val !== ''));
                setDataP1Bjm(parsedP1);
            }

            // --- 1. PROSES DATA ME2N (STO Lookup) ---
            const rowsME2N = parseCSV(csvTextME2N);
            const me2nMap = new Map();
            if (rowsME2N.length > 1) {
                const headersME2N = rowsME2N[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                const parsedME2N = rowsME2N.slice(1).map(row => {
                  const rowObj = {};
                  headersME2N.forEach((h, i) => {
                      if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                  });
                  return rowObj;
                });

                parsedME2N.forEach(row => {
                  const materialNum = row['Material'];
                  if (materialNum && materialNum.trim() !== '') {
                    let docDateVal = null;
                    if (row['Document Date']) {
                      if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(row['Document Date'])) {
                        const p = row['Document Date'].split(/[\/\-]/);
                        docDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                      } else docDateVal = row['Document Date'];
                    }

                    const cleanMat = materialNum.trim().replace(/^0+/, '');
                    
                    const qtyKey = Object.keys(row).find(k => k.toUpperCase().includes('ORDER QUANTITY') || k.toUpperCase() === 'QUANTITY' || k.toUpperCase() === 'QTY');
                    const orderQty = qtyKey ? row[qtyKey] : '';

                    const stillDelivKey = Object.keys(row).find(k => k.toUpperCase().includes('STILL TO BE DELIVERED') || k.toUpperCase().includes('STILL TO DELIV') || k.toUpperCase().includes('STILL TO'));
                    const rawStillDeliv = stillDelivKey ? row[stillDelivKey] : '0';
                    const stillDelivQty = parseFloat(String(rawStillDeliv).replace(/,/g, '')) || 0;

                    me2nMap.set(cleanMat, {
                      purchasingDoc: row['Purchasing Document'],
                      supplyingPlant: row['Supplier/Supplying Plant'],
                      docDate: docDateVal,
                      stoQty: orderQty,
                      stillDelivQty: stillDelivQty
                    });
                  }
                });
            }

            // --- 2. PROSES DATA ZMMR004 (Multi-Layer Lookup PR & PO) ---
            const rowsZMMR = parseCSV(csvTextZMMR);
            const zmmrMapByPO = new Map();
            const zmmrMapByPR = new Map();
            const zmmrMapByRes = new Map();
            
            if (rowsZMMR.length > 1) {
                const headersZMMR = rowsZMMR[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                const parsedZMMR = rowsZMMR.slice(1).map(row => {
                  const rowObj = {};
                  headersZMMR.forEach((h, i) => {
                      if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                  });
                  return rowObj;
                });

                parsedZMMR.forEach(row => {
                  const trackNo = String(row['Tracking No.'] || '').trim();
                  const prNum = String(row['Purch Req.'] || '').trim();
                  const poNum = String(row['PO Number'] || '').trim();

                  if (trackNo || prNum || poNum) {
                    let prDateVal = null;
                    if (row['PR Date']) {
                      if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(row['PR Date'])) {
                        const p = row['PR Date'].split(/[\/\-]/);
                        prDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                      } else prDateVal = row['PR Date'];
                    }
                    
                    let poDateVal = null;
                    if (row['PO Date']) {
                      if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(row['PO Date'])) {
                        const p = row['PO Date'].split(/[\/\-]/);
                        poDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                      } else poDateVal = row['PO Date'];
                    }

                    let grDateVal = null;
                    if (row['GR Posting Date']) {
                      if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(row['GR Posting Date'])) {
                        const p = row['GR Posting Date'].split(/[\/\-]/);
                        grDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                      } else grDateVal = row['GR Posting Date'];
                    }

                    const info = {
                      prNum: prNum,
                      prDate: prDateVal,
                      poNum: poNum,
                      poDate: poDateVal,
                      vendorDesc: row['Vendor Desc.'],
                      vendorCity: row['Vendor City'],
                      deliveryDate: row['Delivery Date'],
                      grNum: row['GR Number'],
                      grDate: grDateVal
                    };

                    if (poNum) zmmrMapByPO.set(poNum.toUpperCase(), info);
                    if (prNum && !zmmrMapByPR.has(prNum.toUpperCase())) zmmrMapByPR.set(prNum.toUpperCase(), info);
                    if (trackNo && !zmmrMapByRes.has(trackNo.toUpperCase())) zmmrMapByRes.set(trackNo.toUpperCase(), info);
                  }
                });
            }

            // --- PROSES DATA MB51 (LOOKUP GI NUMBER) ---
            const rowsMB51 = parseCSV(csvTextMB51);
            const mb51Map = new Map();
            if (rowsMB51.length > 1) {
                const headersMB51 = rowsMB51[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                const parsedMB51 = rowsMB51.slice(1).map(row => {
                  const rowObj = {};
                  headersMB51.forEach((h, i) => {
                      if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                  });
                  return rowObj;
                });

                parsedMB51.forEach(row => {
                  const moOrder = row['Order'];
                  const matNo = row['Material'];
                  if (moOrder && matNo) {
                    const cleanMat = matNo.replace(/^0+/, '');
                    
                    let giDateVal = row['Posting Date'] || null;
                    if (giDateVal && /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(giDateVal)) {
                      const p = giDateVal.split(/[\/\-]/);
                      giDateVal = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                    }

                    mb51Map.set(`${moOrder}_${cleanMat}`, {
                      giNum: row['Material Document'],
                      giDate: giDateVal || row['Posting Date']
                    });
                  }
                });
            }

            // --- PROSES DATA MB52 (LOOKUP STOCK GUDANG / SOH) ---
            const rowsMB52 = parseCSV(csvTextMB52);
            const mb52Map = new Map();
            if (rowsMB52.length > 1) {
                const headersMB52 = rowsMB52[0].map(h => h ? h.replace(/"/g, '').trim() : '');
                const parsedMB52 = rowsMB52.slice(1).map(row => {
                  const rowObj = {};
                  headersMB52.forEach((h, i) => {
                      if (h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
                  });
                  return rowObj;
                });

                parsedMB52.forEach(row => {
                  const matNo = row['Material'] || row['Material Number'];
                  if (matNo) {
                    const cleanMat = matNo.replace(/^0+/, '');
                    const sloc = String(row['Storage Location'] || row['Sloc'] || row['Storage Loc.'] || '').toUpperCase();
                    
                    // Abaikan Stock Damaged, EX Unit, dan Used
                    if (!sloc.includes('DAMAGED') && !sloc.includes('EX') && !sloc.includes('USED')) {
                      // Fokus mengambil SOH secara presisi dari kolom "Unrestricted" sesuai format instruksi
                      const qtyKey = Object.keys(row).find(k => k.trim().toUpperCase() === 'UNRESTRICTED' || k.trim().toUpperCase().includes('UNRESTRICTED'));
                      const rawQty = qtyKey ? row[qtyKey] : '0';
                      // Bersihkan angka dari koma pembatas ribuan sebelum diparse
                      const qty = parseFloat(String(rawQty).replace(/,/g, '')) || 0;
                      
                      const currentQty = mb52Map.get(cleanMat) || 0;
                      mb52Map.set(cleanMat, currentQty + qty);
                    }
                  }
                });
            }

            // --- 3. PROSES DATA MB25 ---
            const rowsMB25 = parseCSV(csvTextMB25);
            if (rowsMB25.length < 2) throw new Error("Format data CSV utama (MB25/MO) kosong atau tidak valid.");

            const headersMB25 = rowsMB25[0].map((h, i) => {
              let name = h ? h.replace(/"/g, '').trim() : '';
              // Resolusi duplikasi nama header 'Quantity' khusus format baru MO
              if (name === 'Quantity') {
                  if (i > 45) return 'GI_Quantity';
                  if (i > 38) return 'GR_Quantity';
                  if (i > 29) return 'PO_Quantity';
                  return 'PR_Quantity';
              }
              return name;
            });

            const parsedMB25 = rowsMB25.slice(1).map(row => {
              const rowObj = {};
              headersMB25.forEach((h, i) => {
                  if(h) rowObj[h] = row[i] ? row[i].replace(/"/g, '').trim() : '';
              });
              return rowObj;
            }).filter(item => (item['Mtc. Order'] && item['Mtc. Order'].trim() !== '') || (item['Order'] && item['Order'].trim() !== ''));

            const uniqueOrders = new Map();

            parsedMB25.forEach(item => {
              let reqDateStr = item['Req Date'] || item['Requirements date'] || '';
              let moDateVal = '2026-06-01';
              if (reqDateStr) {
                if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(reqDateStr)) {
                  const parts = reqDateStr.split(/[\/\-]/);
                  moDateVal = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                } else moDateVal = reqDateStr;
              }

              let desc = String(item['Description'] || item['Material Description'] || '').toUpperCase();
              let docType = 'Normal';
              if (desc.includes('OVH')) docType = 'OVH';
              if (desc.includes('CRITICAL')) docType = 'Critical';

              const orderId = String(item['Mtc. Order'] || item['Order']);
              const reservationNo = String(item['Reservation'] || '').trim();
              
              // FILTER KEBAL TERHADAP NOISE & EKSTRAK PO/PR LANGSUNG DARI MB25 PER MATERIAL
              const rawPR = String(item['PR'] || '').replace(/"/g, '').trim().toUpperCase();
              const hasPR = rawPR !== '' && rawPR !== '-' && rawPR !== 'N/A' && rawPR !== '#N/A' && rawPR !== '0';
              const prNoFromMO = hasPR ? String(item['PR']).trim() : '';

              const rawPO = String(item['PO'] || '').replace(/"/g, '').trim().toUpperCase();
              const hasPO = rawPO !== '' && rawPO !== '-' && rawPO !== 'N/A' && rawPO !== '#N/A' && rawPO !== '0';
              const poNoFromMB25 = hasPO ? String(item['PO']).trim() : null;
              
              const qtyReq = Number(String(item['Qty Res'] || item['Requirement Quantity'] || 0).replace(/,/g, '')) || 0;
              const qtyRec = Number(String(item['GR_Quantity'] || item['GI_Quantity'] || item['Removed quantity'] || 0).replace(/,/g, '')) || 0;

              const equipment = String(item['Equipment'] || '').trim();
              const equipmentDesc = String(item['Equipment Desc'] || item['Equipment Description'] || '').trim();

              // LOOKUP PRESISI TINGGI: Cek berdasarkan PO dulu, jika blank cek PR, jika blank cek Reservation
              let zmmrInfo = null;
              if (hasPO) zmmrInfo = zmmrMapByPO.get(rawPO);
              if (!zmmrInfo && hasPR) zmmrInfo = zmmrMapByPR.get(rawPR);
              if (!zmmrInfo && reservationNo) zmmrInfo = zmmrMapByRes.get(reservationNo.toUpperCase());
              
              const finalPrNum = prNoFromMO || (zmmrInfo ? zmmrInfo.prNum : null);
              const finalHasPR = !!finalPrNum;
              const finalPoNum = poNoFromMB25 || (zmmrInfo ? zmmrInfo.poNum : null);

              const prDateLookup = finalHasPR ? (zmmrInfo ? zmmrInfo.prDate : moDateVal) : null;
              const poDateLookup = finalPoNum ? (zmmrInfo ? zmmrInfo.poDate : moDateVal) : null;
              
              const vendorDesc = zmmrInfo ? zmmrInfo.vendorDesc : '';
              const vendorCity = zmmrInfo ? zmmrInfo.vendorCity : '';
              const deliveryDate = zmmrInfo ? zmmrInfo.deliveryDate : '';
              const grNum = zmmrInfo ? zmmrInfo.grNum : null;
              const grDate = zmmrInfo ? zmmrInfo.grDate : null;

              const materialNo = item['Material'] ? String(item['Material']).trim() : '';
              const cleanMatNo = materialNo.replace(/^0+/, '');
              
              const me2nInfo = me2nMap.get(cleanMatNo);
              const mb51Info = mb51Map.get(`${orderId}_${cleanMatNo}`);
              const mb52Qty = mb52Map.get(cleanMatNo) || 0;

              // PEMBACAAN STAT. DESC YANG FLEKSIBEL
              const statDescKey = Object.keys(item).find(k => k.toUpperCase() === 'STAT. DESC' || k.toUpperCase().includes('STAT. DESC')) || 'Stat. Desc';
              const rawStatDesc = String(item[statDescKey] || '').replace(/"/g, '').trim().toUpperCase();

              const materialDetail = {
                material: materialNo || 'Unknown Part',
                desc: String(item['Description'] || item['Material Description'] || ''),
                reservation: reservationNo,
                qtyReq: qtyReq,
                qtyRec: qtyRec,
                hasPR: finalHasPR,
                prNum: finalPrNum,
                prDate: prDateLookup,
                poNum: finalPoNum,
                poDate: poDateLookup,
                vendorDesc,
                vendorCity,
                deliveryDate,
                grNum,
                grDate,
                stoNum: me2nInfo ? me2nInfo.purchasingDoc : null,
                stoPlant: me2nInfo ? me2nInfo.supplyingPlant : null,
                stoDate: me2nInfo ? me2nInfo.docDate : null,
                stoQty: me2nInfo ? me2nInfo.stoQty : null,
                stillDelivQty: me2nInfo ? me2nInfo.stillDelivQty : 0,
                isSTO: !!me2nInfo && (me2nInfo.stillDelivQty > 0),
                statDesc: rawStatDesc,
                giNum: mb51Info ? mb51Info.giNum : null,
                giDate: mb51Info ? mb51Info.giDate : null,
                stockGudang: mb52Qty // Simpan data ketersediaan stock Gudang di detail material
              };

              if (!uniqueOrders.has(orderId)) {
                uniqueOrders.set(orderId, {
                  id: orderId,
                  reservation: reservationNo,
                  type: docType,
                  moDate: moDateVal,
                  hasPR: finalHasPR,
                  prDate: prDateLookup, 
                  poDate: poDateLookup,
                  trackingData: {
                    prNum: finalPrNum,
                    poNum: finalPoNum,
                    vendorDesc,
                    vendorCity,
                    deliveryDate,
                    grNum,
                    grDate
                  },
                  status: item['Stat. Desc'] || item['Movement Type Text'] || item['Reserv. status'] || 'MO Created',
                  qtyReq: qtyReq,
                  qtyRec: qtyRec,
                  vendor: item['Vendor'] || item['Requestor'] || item['Goods recipient'] || item['User Name'] || 'Unknown',
                  equipment: equipment,
                  equipmentDesc: equipmentDesc,
                  materials: [materialDetail]
                });
              } else {
                const existing = uniqueOrders.get(orderId);
                existing.qtyReq += qtyReq;
                existing.qtyRec += qtyRec;
                existing.materials.push(materialDetail);
                
                if (finalHasPR && !existing.hasPR) { 
                   existing.hasPR = true; 
                   existing.prDate = prDateLookup; 
                   existing.trackingData.prNum = finalPrNum; 
                }
                if (poDateLookup && !existing.poDate) { 
                   existing.poDate = poDateLookup; 
                   existing.trackingData.poNum = finalPoNum;
                   existing.trackingData.vendorDesc = vendorDesc;
                   existing.trackingData.vendorCity = vendorCity;
                   existing.trackingData.deliveryDate = deliveryDate;
                }
                if (docType === 'Critical') existing.type = 'Critical';
                else if (docType === 'OVH' && existing.type !== 'Critical') existing.type = 'OVH';
              }
            });

            const finalData = Array.from(uniqueOrders.values());
            
            // Mengurutkan Material: Status OUTSTANDING selalu diletakkan di urutan teratas
            finalData.forEach(mo => {
              mo.materials.sort((a, b) => {
                const aOS = a.statDesc.toUpperCase().includes('OUTSTANDING') ? 1 : 0;
                const bOS = b.statDesc.toUpperCase().includes('OUTSTANDING') ? 1 : 0;
                return bOS - aOS; 
              });
            });

            setData(finalData);
          } catch (error) {
            console.error("Gagal menarik data:", error);
            setErrorMsg(error.message);
          } finally {
            setLoading(false);
            setIsSyncing(false);
          }
        };

        fetchSheetData();

        const intervalId = setInterval(() => {
          setSyncCount(prev => prev + 1);
        }, 30000);

        return () => clearInterval(intervalId);
      }, [syncCount]);

      const openTrackingModalInternal = (found) => {
        setSelectedTrackingMO(found.id);
        if (found.materials.length === 1) {
          setSelectedTrackingItemIndex('0');
          setMaterialSearchInput(found.materials[0].material);
        } else {
          setSelectedTrackingItemIndex('');
          setMaterialSearchInput('');
        }
        setIsTrackingModalOpen(true);
      };

      const handleMainTrackSubmit = (e) => {
        e.preventDefault();
        if (!mainTrackingInput.trim()) return;

        const inputTrimmed = mainTrackingInput.trim().toUpperCase();
        const found = data.find(d => 
            d.id.toUpperCase() === inputTrimmed || 
            (d.reservation && d.reservation.toUpperCase() === inputTrimmed) ||
            (d.trackingData && d.trackingData.prNum && d.trackingData.prNum.toUpperCase() === inputTrimmed) ||
            (d.trackingData && d.trackingData.poNum && d.trackingData.poNum.toUpperCase() === inputTrimmed) ||
            d.materials.some(m => (m.prNum && m.prNum.toUpperCase() === inputTrimmed) || (m.poNum && m.poNum.toUpperCase() === inputTrimmed))
        );
        
        if (found) {
            setMainTrackingError('');
            
            const osCount = found.materials.filter(m => m.statDesc.toUpperCase().includes('OUTSTANDING')).length;
            if (!found.hasPR && osCount > 0) {
                setOsAlert({ show: true, count: osCount, foundMo: found });
            } else {
                openTrackingModalInternal(found);
            }
        } else {
            setMainTrackingError("Nomor MO, Reservation, PR, atau PO tidak ditemukan di dalam sistem aktif.");
        }
      };

      // --- KUMPULAN LOGIKA FILTER DATA UNTUK P1 BJM DENGAN PIE CHART (Khusus CN) ---
      const p1BjmOptions = useMemo(() => {
        if (!dataP1Bjm || dataP1Bjm.length === 0) return [];
        const options = new Set();
        dataP1Bjm.forEach(row => {
            const cnKey = Object.keys(row).find(k => k.toUpperCase() === 'CN' || k.toUpperCase().includes('NOMOR UNIT') || k.toUpperCase().includes('NO UNIT'));
            if (cnKey && row[cnKey]) options.add(row[cnKey]);
        });
        return Array.from(options).filter(Boolean).sort();
      }, [dataP1Bjm]);

      const filteredP1BjmData = useMemo(() => {
         let filtered = dataP1Bjm;

         if (selectedP1BjmFilter.trim() !== '') {
             const searchUpper = selectedP1BjmFilter.toUpperCase();
             filtered = filtered.filter(row => {
                 const cnKey = Object.keys(row).find(k => k.toUpperCase() === 'CN' || k.toUpperCase().includes('NOMOR UNIT') || k.toUpperCase().includes('NO UNIT'));
                 return cnKey && String(row[cnKey]).toUpperCase().includes(searchUpper);
             });
         }

         if (searchTermP1.trim() !== '') {
             const searchUpper = searchTermP1.toLowerCase();
             filtered = filtered.filter(row => 
                 Object.values(row).some(val => String(val).toLowerCase().includes(searchUpper))
             );
         }

         return filtered;
      }, [dataP1Bjm, selectedP1BjmFilter, searchTermP1]);

      const p1BjmChartData = useMemo(() => {
         if (filteredP1BjmData.length === 0) return { data: [], total: 0 };
         
         const statusCounts = {};
         filteredP1BjmData.forEach(row => {
             const statusKey = Object.keys(row).find(k => k.toUpperCase().includes('STTS SUPPLY KE AGM'));
             if (statusKey) {
                 const status = row[statusKey] || 'BLANK / KOSONG';
                 statusCounts[status] = (statusCounts[status] || 0) + 1;
             }
         });

         const chartArr = Object.entries(statusCounts).map(([name, value]) => ({ name, value }));
         const total = chartArr.reduce((sum, item) => sum + item.value, 0);

         return { data: chartArr.sort((a,b) => b.value - a.value), total };
      }, [filteredP1BjmData]);

      const searchSuggestions = useMemo(() => {
        if (!mainTrackingInput.trim()) return [];
        const lowerInput = mainTrackingInput.toLowerCase();
        return data.filter(d => 
          d.id.toLowerCase().includes(lowerInput) || 
          (d.reservation && d.reservation.toLowerCase().includes(lowerInput)) ||
          (d.trackingData && d.trackingData.prNum && d.trackingData.prNum.toLowerCase().includes(lowerInput)) ||
          (d.trackingData && d.trackingData.poNum && d.trackingData.poNum.toLowerCase().includes(lowerInput)) ||
          d.materials.some(m => (m.prNum && m.prNum.toLowerCase().includes(lowerInput)) || (m.poNum && m.poNum.toLowerCase().includes(lowerInput)))
        ).slice(0, 5);
      }, [mainTrackingInput, data]);

      const analytics = useMemo(() => {
        let waitingPR = 0;
        let outstanding = 0;
        let partial = 0;
        let complete = 0;
        let total = data.length;
        let activeAlarmsCount = 0;

        if (total === 0) return { total: 0, waitingPR: {count:0, pct:0}, outstanding: { count: 0, pct: 0 }, partial: { count: 0, pct: 0 }, complete: { count: 0, pct: 0 }, activeAlarmsCount: 0 };

        data.forEach(item => {
          if (!item.hasPR) {
            waitingPR++;
          }

          if (item.qtyRec === 0 && !item.poDate) {
            outstanding++;
          } else if (item.qtyRec > 0 && item.qtyRec < item.qtyReq) {
            partial++;
          } else if (item.qtyRec === item.qtyReq && item.qtyReq > 0) {
            complete++;
          } else if (item.poDate && item.qtyRec === 0) {
             outstanding++; 
          }

          const alarms = checkAlarms(item);
          if (alarms.some(a => ['danger', 'critical', 'warning'].includes(a.type))) {
            activeAlarmsCount++;
          }
        });

        return {
          total,
          waitingPR: { count: waitingPR, pct: Math.round((waitingPR / total) * 100) },
          outstanding: { count: outstanding, pct: Math.round((outstanding / total) * 100) },
          partial: { count: partial, pct: Math.round((partial / total) * 100) },
          complete: { count: complete, pct: Math.round((complete / total) * 100) },
          activeAlarmsCount
        };
      }, [data]);

                        );
                     })()}
                   </div>

                   {/* Timeline Container */}
                   {selectedTrackingMO && selectedTrackingItemIndex !== '' && (
                     <div className="relative pl-6 pr-6 py-6 mt-2 bg-slate-50 border border-slate-200 shadow-sm rounded-xl animate-fade-in">
                       {(() => {
                          const trk = data.find(d => d.id === selectedTrackingMO);
                          if (!trk) return null;
                          const mat = trk.materials[selectedTrackingItemIndex];
                          if (!mat) return null;
                          
                          // Pastikan MO dianggap "Closed" HANYA jika qtyRec (Terima) memenuhi qtyReq (Permintaan)
                          const isMoClosedComplete = !trk.hasPR && trk.materials.length > 0 && trk.materials.every(m => m.statDesc.includes('COMPLETE') && m.qtyRec >= m.qtyReq);
                          const hasOS = trk.materials.some(m => m.statDesc.toUpperCase().includes('OUTSTANDING'));
                          const isMatComplete = mat.statDesc.toUpperCase().includes('COMPLETE');
                          
                          const isSTO = !mat.hasPR && mat.isSTO;

                          // Kondisi untuk menandakan bahwa kita masih menunggu PR/STO dibuat
                          const isWaitingForPRorSTO = !mat.hasPR && mat.statDesc.toUpperCase().includes('OUTSTANDING') && !mat.giNum && !(mat.stockGudang >= mat.qtyReq && mat.stockGudang > 0) && !mat.isSTO;

                          // Perhitungan Tanggal ETA Kustom Berdasarkan Supplying Plant (STO)
                          const stoEtaDetails = getStoEtaDetails(mat.stoPlant, mat.stoDate);
                          const calculatedStoEtaDate = (isSTO && stoEtaDetails.hasRule) ? stoEtaDetails.date : (mat.deliveryDate || mat.stoDate);
                          
                          // Mencegah ETA menjadi overdue/alarm jika masih menunggu PR/STO dibuat
                          const isEtaOverdue = calculatedStoEtaDate && isDateOverdue(calculatedStoEtaDate) && !mat.grNum && !isWaitingForPRorSTO;

                          let steps = [];

                          if (isMoClosedComplete) {
                            steps = [
                              { title: "Material Order Dibuat", date: trk.moDate, active: true, desc: `Order: ${trk.id} (Tgl: ${trk.moDate}) - Part: ${mat.material} (Qty Res: ${mat.qtyReq})`, isFinal: false, isOverdue: false },
                              { title: "MO Closed", date: TODAY.toLocaleDateString('id-ID'), active: true, desc: "Status MO tersebut 100% Complete", isFinal: true, isOverdue: false, remarks: "Diselesaikan via Stock / Manuver STO" }
                            ];
                          } else {
                            let prOrStoStep;
                            let isUsingStock = false;
                            if (!mat.hasPR && mat.statDesc.toUpperCase().includes('OUTSTANDING') && !mat.giNum) {
                                if (mat.stockGudang >= mat.qtyReq && mat.stockGudang > 0) {
                                    isUsingStock = true;
                                    prOrStoStep = {
                                      title: "Alokasi Stock Gudang (MB52)",
                                      date: TODAY.toLocaleDateString('id-ID'),
                                      active: true,
                                      desc: "Keterangan: Material ini akan menggunakan Stock Gudang",
                                      isFinal: false,
                                      isOverdue: false,
                                      remarks: `Sisa Stock Tersedia: ${mat.stockGudang} PC`
                                    };
                                } else {
                                    if (mat.isSTO) {
                                        prOrStoStep = {
                                          title: "Stock Transfer Order",
                                          date: mat.stoDate || TODAY.toLocaleDateString('id-ID'),
                                          active: true,
                                          desc: `Purchasing Document: ${mat.stoNum} | Order Qty: ${mat.stoQty || '-'}`,
                                          isFinal: false,
                                          isOverdue: false,
                                          remarks: `Supplying Plant: ${mat.stoPlant}`
                                        };
                                    } else {
                                        prOrStoStep = {
                                          title: "Purchase Requisition (PR)",
                                          date: TODAY.toLocaleDateString('id-ID'),
                                          active: false,
                                          desc: "Belum di-release",
                                          isFinal: false,
                                          isOverdue: true,
                                          remarks: "Waiting Creat PR / Creat STO"
                                        };
                                    }
                                }
                            } else {
                                prOrStoStep = isSTO ? { 
                                  title: "STO Maneuver (No PR Required)", 
                                  date: mat.stoDate, 
                                  active: true, 
                                  desc: `Maneuver STO via ME2N - Supplying Plant: ${mat.stoPlant}`, 
                                  isFinal: false, 
                                  isOverdue: false 
                                } : { 
                                  title: "Purchase Requisition (PR)", 
                                  date: mat.prDate, 
                                  active: mat.hasPR, 
                                  desc: mat.hasPR && mat.prNum ? `PR No: ${mat.prNum} (Tgl: ${mat.prDate})` : "Belum di-release", 
                                  isFinal: false, 
                                  isOverdue: false 
                                };
                            }

                            if (isUsingStock) {
                              steps = [
                                { title: "Material Order Dibuat", date: trk.moDate, active: true, desc: `Order: ${trk.id} (Tgl: ${trk.moDate}) - Part: ${mat.material} (Qty Res: ${mat.qtyReq})`, isFinal: false, isOverdue: false },
                                prOrStoStep,
                                { 
                                  title: "Goods Issue (GI)", 
                                  date: mat.giDate || TODAY.toLocaleDateString('id-ID'), 
                                  active: !!mat.giNum, 
                                  desc: mat.giNum ? `GI No: ${mat.giNum} (Status: Administrasi Close)` : "Barang belum di-GI", 
                                  isFinal: true, 
                                  isOverdue: !mat.giNum, 
                                  remarks: mat.giNum ? "MO Closed" : "Lakukan GI agar item ini close" 
                                }
                              ];
                            } else {
                              steps = [
                                { title: "Material Order Dibuat", date: trk.moDate, active: true, desc: `Order: ${trk.id} (Tgl: ${trk.moDate}) - Part: ${mat.material} (Qty Res: ${mat.qtyReq})`, isFinal: false, isOverdue: false },
                                prOrStoStep,
                                isSTO ? { 
                                  title: "Purchasing Document (STO)", 
                                  date: mat.stoDate, 
                                  active: true, 
                                  desc: `Doc No: ${mat.stoNum} (Tgl: ${mat.stoDate})`, 
                                  isFinal: false, 
                                  isOverdue: false 
                                } : { 
                                  title: "Purchase Order (PO)", 
                                  date: mat.poDate, 
                                  active: !!mat.poDate, 
                                  desc: mat.poNum ? `PO No: ${mat.poNum} (Tgl: ${mat.poDate})` : "Menunggu PO Number diterbitkan", 
                                  isFinal: false, 
                                  isOverdue: false 
                                },
                                { title: "Vendor Processing", date: mat.poDate || mat.stoDate, active: !!mat.vendorDesc || isSTO, desc: mat.vendorDesc ? `${mat.vendorDesc} - ${mat.vendorCity}` : (isSTO ? `Supplying: ${mat.stoPlant}` : "Menunggu konfirmasi Vendor"), isFinal: false, isOverdue: false },
                                { 
                                  title: "Estimasi Kedatangan (ETA)", 
                                  date: isWaitingForPRorSTO ? null : calculatedStoEtaDate, 
                                  active: (!!calculatedStoEtaDate || isSTO) && !isWaitingForPRorSTO, 
                                  desc: mat.deliveryDate ? `Tiba di tujuan pada: ${mat.deliveryDate}` : (isSTO ? `Estimasi STO: ${calculatedStoEtaDate}` : "Tanggal resi belum tersedia"), 
                                  isFinal: false, 
                                  isOverdue: isEtaOverdue,
                                  remarks: (isSTO && stoEtaDetails.hasRule) ? "Estimasi berdasarkan Rata-rata Pengiriman Dari Site atau Supplying" : null
                                },
                                { 
                                  title: "Good Receive (GR)", 
                                  date: mat.grDate, 
                                  active: !!mat.grNum || isMatComplete, 
                                  desc: mat.grNum ? `GR No: ${mat.grNum} (Qty: ${mat.qtyRec}/${mat.qtyReq})` : (isMatComplete ? `Status: Complete (Qty: ${mat.qtyRec}/${mat.qtyReq})` : "Barang belum diterima / GR"), 
                                  isFinal: false, 
                                  isOverdue: isMatComplete && mat.qtyRec < mat.qtyReq, 
                                  remarks: (isMatComplete && mat.qtyRec < mat.qtyReq) ? "GR Partial mohon lakukan FU dan Kalibrasi stock atau lakukan stock opname" : (mat.grNum ? `Total Stock: ${mat.stockGudang} PC` : null) 
                                },
                                { title: "Goods Issue (GI)", date: mat.giDate, active: !!mat.giNum, desc: mat.giNum ? `GI No: ${mat.giNum} (Status: Administrasi Close)` : "Menunggu proses GI", isFinal: true, isOverdue: !!mat.grNum && !mat.giNum, remarks: mat.giNum ? "MO Closed" : (mat.grNum ? "Silakan lakukan GI" : null) }
                              ];
                            }
                          }

                          return (
                            <div className="flex flex-col">
                              {isMoClosedComplete && (
                                <div className="mb-6 bg-emerald-50 border border-emerald-200 p-4 rounded-xl flex items-center shadow-sm z-10 relative">
                                  <IconCheckCircle2 className="w-8 h-8 text-emerald-500 flex-shrink-0 mr-3" />
                                  <div>
                                    <p className="text-emerald-800 font-extrabold text-lg">Status MO tersebut 100% Complete</p>
                                    <p className="text-emerald-600 text-sm font-medium">Seluruh material pada MO ini telah terpenuhi via Stock / STO.</p>
                                  </div>
                                </div>
                              )}
                              <div className="relative pt-2 pb-2">
                                <div className="absolute left-[11px] top-4 bottom-4 w-1 bg-slate-200 rounded-full"></div>
                                
                                <div className="space-y-8 relative">
                                  {steps.map((step, sIdx) => (
                                     <div key={`step-${sIdx}`} className={`flex items-start ${step.active || step.isOverdue ? 'opacity-100' : 'opacity-40 transition-opacity'}`}>
                                        <div className={`relative z-10 w-6 h-6 rounded-full flex items-center justify-center border-[3px] border-white shadow-md mt-0.5 flex-shrink-0 ${
                                          step.isOverdue 
                                            ? 'bg-rose-600 animate-pulse'
                                            : step.active 
                                              ? (step.isFinal ? 'bg-gradient-to-br from-emerald-500 to-green-600' : 'bg-gradient-to-br from-[#9B2226] to-[#C12A2F]') 
                                              : 'bg-slate-300'
                                        }`}>
                                          {step.isFinal && step.active && <IconCheckCircle2 className="w-3 h-3 text-white" />}
                                          {step.isOverdue && <IconAlertTriangle className="w-3 h-3 text-white" />}
                                        </div>
                                        
                                        <div className={`ml-5 flex-1 p-3 rounded-lg border shadow-sm relative -mt-2 ${step.isOverdue ? 'border-rose-500 bg-rose-50 ring-1 ring-rose-500/50' : (step.isFinal && step.active ? 'border-emerald-200 bg-emerald-50/30 bg-white' : 'border-slate-100 bg-white')}`}>
                                           <h3 className={`text-sm md:text-base font-extrabold ${step.isOverdue ? 'text-rose-800' : (step.active ? (step.isFinal ? 'text-emerald-700' : 'text-slate-800') : 'text-slate-500')}`}>{step.title}</h3>
                                           <div className="flex flex-col md:flex-row md:items-center mt-1 md:space-x-2">
                                              <span className={`text-xs md:text-sm font-extrabold ${step.isOverdue ? 'text-rose-700' : (step.active ? (step.isFinal ? 'text-emerald-600' : 'text-[#9B2226]') : 'text-slate-400')}`}>
                                                {step.date || '--/--/----'}
                                              </span>
                                              {step.remarks && (
                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded md:inline-block block w-fit ${step.isOverdue ? 'bg-rose-200 text-rose-800 border-rose-300 border' : 'bg-amber-50 text-amber-700 border border-amber-200'}`}>
                                                  {step.remarks}
                                                </span>
                                              )}
                                              <span className="hidden md:inline text-slate-300">|</span>
                                              <span className={`text-xs md:text-sm font-medium truncate mt-0.5 md:mt-0 ${step.isOverdue ? 'text-rose-800 font-bold' : (step.isFinal && step.active ? 'text-emerald-700 font-bold' : 'text-slate-500')}`}>
                                                {step.isOverdue ? `${step.desc} - OVERDUE (Lakukan Follow Up)` : step.desc}
                                              </span>
                                           </div>
                                        </div>
                                     </div>
                                  ))}
                                </div>
                              </div>
                            </div>
                          );
                       })()}
                     </div>
                   )}
                </div>
              </div>
            </div>
          )}

          {/* MODAL POP UP ALARM */}
          {isAlarmPopupOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-[#F8FAFC] rounded-2xl shadow-2xl w-full max-w-5xl max-h-[85vh] flex flex-col overflow-hidden border border-slate-200">
                <div className="p-5 border-b border-red-900/20 flex justify-between items-center bg-[#9B2226] text-white">
                  <div className="flex items-center">
                    <IconBell className="w-6 h-6 mr-3 animate-bounce" />
                    <h2 className="text-xl font-extrabold tracking-wide">ALARM & NOTIFICATION CENTER</h2>
                  </div>
                  <button onClick={() => setIsAlarmPopupOpen(false)} className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-bold transition border border-white/20 shadow-sm">
                    TUTUP
                  </button>
                </div>
                <div className="p-0 overflow-y-auto custom-scrollbar flex-1 bg-white">
                   <div className="overflow-x-auto w-full">
                     <table className="w-full text-left border-collapse whitespace-nowrap">
                       <thead className="bg-slate-50 sticky top-0 z-10 border-b border-slate-200 shadow-sm">
                         <tr className="text-slate-500 text-[11px] uppercase tracking-wider">
                           <th className="px-6 py-4 font-bold">MO Number</th>
                           <th className="px-6 py-4 font-bold">Req Date</th>
                           <th className="px-6 py-4 font-bold">Reservation</th>
                           <th className="px-6 py-4 font-bold">Type</th>
                           <th className="px-6 py-4 font-bold w-1/2">Alert Details</th>
                         </tr>
                       </thead>
                       <tbody className="text-sm divide-y divide-slate-100">
                          {data.map((item, index) => {
                            const alarms = checkAlarms(item).filter(a => ['danger', 'critical', 'warning'].includes(a.type));
                            if (alarms.length === 0) return null;

                            return (
                              <tr key={`popup-alarm-${item.id}-${index}`} className="hover:bg-rose-50/40 transition-colors group">
                                <td className="px-6 py-3 font-extrabold text-slate-800">{item.id}</td>
                                <td className="px-6 py-3 font-medium text-slate-600">
                                  <div className="flex items-center text-xs">
                                    <IconClock className="w-3 h-3 mr-1" /> {item.moDate}
                                  </div>
                                </td>
                                <td className="px-6 py-3 font-medium text-slate-500">{item.reservation || 'N/A'}</td>
                                <td className="px-6 py-3">
                                  <span className={`text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider ${
                                    item.type === 'Critical' ? 'bg-red-50 text-red-700 ring-1 ring-inset ring-red-600/20' : 
                                    item.type === 'OVH' ? 'bg-purple-50 text-purple-700 ring-1 ring-inset ring-purple-600/20' : 'bg-slate-50 text-slate-700 ring-1 ring-inset ring-slate-600/20'
                                  }`}>{item.type}</span>
                                </td>
                                <td className="px-6 py-3">
                                  <div className="flex flex-col space-y-1.5">
                                    {alarms.map((alarm, idx) => (
                                      <div key={`popup-alarm-item-${idx}`} className="flex items-center text-sm">
                                        <span className="relative flex h-2.5 w-2.5 mr-2.5 flex-shrink-0">
                                          <span className={`animate-ping absolute inline-flex h-full w-full rounded-full ${alarm.type === 'warning' ? 'bg-amber-400' : 'bg-rose-400'} opacity-75`}></span>
                                          <span className={`relative inline-flex rounded-full h-2.5 w-2.5 ${alarm.type === 'warning' ? 'bg-amber-500' : 'bg-rose-500'}`}></span>
                                        </span>
                                        <span className={`font-bold ${alarm.type === 'warning' ? 'text-amber-600' : 'text-rose-600'} mr-2`}>
                                          {alarm.msg}
                                        </span>
                                        <span className="text-xs text-slate-500 bg-slate-50 px-2 py-0.5 rounded border border-slate-100">
                                          {alarm.detail}
                                        </span>
                                      </div>
                                    ))}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                       </tbody>
                     </table>
                   </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL KODE AKSES SPEX */}
          {isPassModalOpen && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/80 backdrop-blur-md p-4 animate-fade-in">
              <div className="bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] w-full max-w-md border border-slate-200/60 overflow-hidden">
                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-[#9B2226] text-white">
                  <div className="flex items-center space-x-2">
                    <IconSearchCode className="w-5 h-5 text-white/90" />
                    <h3 className="text-lg font-bold tracking-wide">Akses Terbatas</h3>
                  </div>
                  <button 
                    onClick={() => setIsPassModalOpen(false)} 
                    className="text-white/70 hover:text-white font-extrabold text-sm"
                  >
                    BATAL
                  </button>
                </div>
                <form 
                  onSubmit={(e) => {
                    e.preventDefault();
                    if (passwordInput === 'SPEX') {
                      setIsAuthenticated(true);
                      setIsPassModalOpen(false);
                      setCurrentView('dashboard');
                      setPassError('');
                    } else {
                      setPassError('Kode akses salah! Hubungi Administrator.');
                    }
                  }}
                  className="p-6 space-y-4"
                >
                  <div className="text-center">
                    <p className="text-sm text-slate-600 font-medium">
                      Halaman <span className="font-extrabold text-[#9B2226]">Plant Dept Material Monitoring</span> dilindungi kode akses internal. Silakan masukkan kode akses Anda untuk melanjutkan.
                    </p>
                  </div>
                  <div className="space-y-2">
                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">KODE AKSES (PASSWORD)</label>
                    <input 
                      type="password" 
                      placeholder="Masukkan Kode Akses..." 
                      className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl font-mono text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-[#9B2226]/30 transition shadow-sm"
                      value={passwordInput}
                      onChange={(e) => setPasswordInput(e.target.value)}
                      required
                      autoFocus
                    />
                    {passError && (
                      <p className="text-xs text-rose-600 font-bold text-center mt-1 flex items-center justify-center">
                        <IconAlertTriangle className="w-3.5 h-3.5 mr-1 flex-shrink-0 animate-bounce" /> {passError}
                      </p>
                    )}
                  </div>
                  <button 
                    type="submit" 
                    className="w-full bg-gradient-to-r from-[#9B2226] to-[#C12A2F] hover:from-[#811D1D] hover:to-[#A32327] text-white py-3 rounded-xl font-bold uppercase tracking-wider transition-all duration-300 shadow-md flex items-center justify-center"
                  >
                    Verifikasi Akses
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* MODAL POP UP OUTSTANDING ALERT */}
          {osAlert.show && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center bg-slate-900/80 backdrop-blur-md p-4 animate-fade-in">
              <div className="bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] w-full max-w-md border border-slate-200/60 overflow-hidden">
                <div className="p-5 border-b border-rose-100 flex justify-between items-center bg-rose-50 text-rose-800">
                  <div className="flex items-center space-x-2">
                    <IconAlertTriangle className="w-6 h-6 text-rose-600 animate-pulse" />
                    <h3 className="text-lg font-bold tracking-wide">Peringatan Outstanding</h3>
                  </div>
                </div>
                <div className="p-6 text-center space-y-4">
                  <p className="text-sm text-slate-600 font-medium">
                    Terdapat <span className="font-extrabold text-rose-600 text-xl mx-1">{osAlert.count}</span> material yang masih berstatus <span className="font-bold text-slate-800">OUTSTANDING</span> pada MO ini.
                  </p>
                  <p className="text-xs text-slate-500">
                    MO ini belum sepenuhnya completed. Material yang Outstanding akan otomatis ditampilkan pada urutan teratas di dalam pelacakan.
                  </p>
                  <button 
                    onClick={() => {
                      const found = osAlert.foundMo;
                      setOsAlert({ show: false, count: 0, foundMo: null });
                      
                      setSelectedTrackingMO(found.id);
                      setSelectedTrackingItemIndex('0');
                      setMaterialSearchInput(found.materials[0].material);
                      setIsTrackingModalOpen(true);
                    }}
                    className="w-full bg-gradient-to-r from-rose-600 to-rose-700 hover:from-rose-700 hover:to-rose-800 text-white py-3 rounded-xl font-bold uppercase tracking-wider transition-all duration-300 shadow-md flex items-center justify-center mt-4"
                  >
                    Oke, Lacak Material
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render Aplikasi
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
